<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <link rel="stylesheet" href="css/style.css">

    <title>Verde Suculenta - Arreglos Ornamentales</title>
</head>
<body>
<header>
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <span class="fw-bold text-primary">Verde Suculenta</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="tienda.html">Tienda</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="contacto.html">Contacto</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="nosotros.html">Nosotros</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
</header>

<main>
    <div class="container py-5">
        <h1 class="text-center mb-5 text-primary">Contáctanos</h1>
        <div class="row">
            <div class="col-md-8 mx-auto">
                <form class="row g-3 needs-validation" novalidate>
                    <div class="col-12">
                        <label for="contactName" class="form-label">Nombre Completo</label>
                        <input type="text" class="form-control rounded-0 border-0" id="contactName" required>
                        <div class="invalid-feedback">
                            Por favor, ingresa tu nombre.
                        </div>
                    </div>
                    <div class="col-12">
                        <label for="contactEmail" class="form-label">Correo Electrónico</label>
                        <input type="email" class="form-control rounded-0 border-0" id="contactEmail" required>
                        <div class="invalid-feedback">
                            Por favor, ingresa una dirección de correo válida.
                        </div>
                    </div>
                    <div class="col-12">
                        <label for="contactMessage" class="form-label">Mensaje</label>
                        <textarea class="form-control rounded-0 border-0" id="contactMessage" rows="5" required></textarea>
                        <div class="invalid-feedback">
                            Por favor, escribe tu mensaje.
                        </div>
                    </div>
                    <div class="col-12 text-center">
                        <button class="btn btn-primary btn-lg rounded-0 border-0" type="submit">Enviar Mensaje</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>

<footer class="py-4 mt-auto" style="background-color: var(--succulent-green-dark);">
    <div class="container text-center text-white">
        <small>Copyright &copy; 2024 Verde Suculenta. Todos los derechos reservados.</small>
        </div>
</footer>

    <script src="js/form-validation.js"></script>
</body>
</html>
