<main>
        <div id="carouselExampleControls" class="carousel slide" data-ride="carousel">
  <div class="carousel-inner">
    <div class="carousel-item active">
      <img class="d-block w-100" src="/images/placeholder.png" alt="First slide">
    </div>
    <div class="carousel-item">
      <img class="d-block w-100" src="/images/suculentas_inicio.png" alt="Second slide">

    <div class="album py-5" style="background-color: whitesmoke;">
        <div class="container py-5">
        <h1 class="text-center mb-5 text-primary">Contáctanos</h1>
        <div class="row">
            <div class="col-md-8 mx-auto">
                <form class="row g-3 needs-validation" novalidate>
                    <div class="col-12">
                        <label for="contactName" class="form-label">Nombre Completo</label>
                        <input type="text" class="form-control rounded-0 border-0" id="contactName" required>
                        <div class="invalid-feedback">
                            Por favor, ingresa tu nombre.
                        </div>
                    </div>
                    <div class="col-12">
                        <label for="contactEmail" class="form-label">Correo Electrónico</label>
                        <input type="email" class="form-control rounded-0 border-0" id="contactEmail" required>
                        <div class="invalid-feedback">
                            Por favor, ingresa una dirección de correo válida.
                        </div>
                    </div>
                    <div class="col-12">
                        <label for="contactMessage" class="form-label">Mensaje</label>
                        <textarea class="form-control rounded-0 border-0" id="contactMessage" rows="5" required></textarea>
                        <div class="invalid-feedback">
                            Por favor, escribe tu mensaje.
                        </div>
                    </div>
                    <div class="col-12 text-center">
                        <button class="btn btn-primary btn-lg rounded-0 border-0" type="submit">Enviar Mensaje</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</main>
